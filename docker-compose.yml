services:
  postgres:
    image: postgres:16
    container_name: schema_designer_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-schema_designer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-schema_designer_pw}
      POSTGRES_DB: ${POSTGRES_DB:-schema_designer}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
